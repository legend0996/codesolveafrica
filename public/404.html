<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CodeSolveAfrica</title>
    <script>
      // GitHub Pages SPA redirect — preserves the path for React Router.
      // Encodes the full URL into the query string and redirects to the root.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' +
        '?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
