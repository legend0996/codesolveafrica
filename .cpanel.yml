---
deployment:
  tasks:
    # Build the React frontend
    - export NODE_ENV=production
    - /usr/local/bin/npm install
    - /usr/local/bin/npm run build

    # Copy built frontend to public_html
    - export DEPLOYPATH=/home3/logicore/codesolveafrica.co.ke
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R dist/. $DEPLOYPATH/

    # Deploy backend to Node.js app directory
    - export BACKENDPATH=/home3/logicore/codesolveafrica-backend
    - /bin/mkdir -p $BACKENDPATH
    - /bin/cp -R backend/. $BACKENDPATH/
    - /usr/local/bin/npm install --prefix $BACKENDPATH
