services:
  # ── Backend: Express/Node.js API ──────────────────────────────────────────
  - type: web
    name: codesolveafrica-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false          # Set this manually in the Render dashboard
      - key: CLIENT_URL
        fromService:
          name: codesolveafrica-frontend
          type: web
          property: host
          format: "https://{value}"

  # ── Frontend: React/Vite Static Site ────────────────────────────────────
  - type: web
    name: codesolveafrica-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: codesolveafrica-api
          type: web
          property: host
          format: "https://{value}"
    routes:
      # Send all routes to index.html so React Router works
      - type: rewrite
        source: /*
        destination: /index.html
